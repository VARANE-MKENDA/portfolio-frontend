<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .error-page {
            min-height: 100vh; display: flex; align-items: center;
            justify-content: center; text-align: center;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #fff; padding: 40px;
        }
        .error-page h1 { font-size: 8rem; color: #6c63ff; line-height: 1; }
        .error-page h2 { font-size: 2rem; margin: 16px 0; }
        .error-page p { color: #94a3b8; margin-bottom: 32px; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="error-page">
        <div>
            <h1>404</h1>
            <h2>Page Not Found</h2>
            <p>The page you're looking for doesn't exist or has been moved.</p>
            <a href="/" class="btn btn-primary">← Back to Portfolio</a>
        </div>
    </div>
</body>
</html>
